<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Mona Backend Dashboard</title>
        <style>
            body {
                font-family:
                    system-ui,
                    -apple-system,
                    sans-serif;
                background-color: #121212;
                color: #e0e0e0;
                padding: 2rem;
                max-width: 1000px;
                margin: 0 auto;
            }
            h1 {
                border-bottom: 2px solid #333;
                padding-bottom: 0.5rem;
            }
            button {
                background-color: #bb86fc;
                color: #000;
                border: none;
                padding: 8px 16px;
                border-radius: 4px;
                cursor: pointer;
                font-weight: bold;
                margin-bottom: 1rem;
            }
            button:hover {
                background-color: #9965f4;
            }
            table {
                width: 100%;
                border-collapse: collapse;
                background-color: #1e1e1e;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            }
            th,
            td {
                padding: 12px;
                text-align: left;
                border-bottom: 1px solid #333;
            }
            th {
                background-color: #2d2d2d;
                color: #bb86fc;
            }
            tr:hover {
                background-color: #2a2a2a;
            }
            .deleted {
                color: #cf6679;
            }
        </style>
    </head>
    <body>
        <h1>Mona Sync Data</h1>
        <h2>Blood Tests</h2>

        <button onclick="fetchData()">Refresh Data</button>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Date / Time</th>
                    <th>Estradiol</th>
                    <th>Testosterone</th>
                    <th>Last Updated</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>

        <script>
            async function fetchData() {
                const tbody = document.getElementById("table-body");
                tbody.innerHTML = '<tr><td colspan="6">Loading...</td></tr>';

                try {
                    // Fetch all records from the dawn of time
                    const response = await fetch(
                        "/api/sync/blood_tests?last_sync=0",
                    );
                    const data = await response.json();

                    tbody.innerHTML = ""; // Clear loading text

                    if (data.length === 0) {
                        tbody.innerHTML =
                            '<tr><td colspan="6">No data found in database.</td></tr>';
                        return;
                    }

                    data.forEach((test) => {
                        // Convert Unix timestamp (milliseconds) to readable string
                        const updatedDate = new Date(
                            test.updatedAt,
                        ).toLocaleString();
                        const statusText = test.isDeleted
                            ? '<span class="deleted">Deleted</span>'
                            : "Active";

                        const row = `<tr>
                        <td title="${test.id}">${test.id.substring(0, 8)}...</td>
                        <td>${test.dateTime.replace("T", " ")}</td>
                        <td>${test.estradiolLevels || "-"}</td>
                        <td>${test.testosteroneLevels || "-"}</td>
                        <td>${updatedDate}</td>
                        <td>${statusText}</td>
                    </tr>`;

                        tbody.innerHTML += row;
                    });
                } catch (error) {
                    console.error("Error fetching data:", error);
                    tbody.innerHTML =
                        '<tr><td colspan="6" style="color: #cf6679;">Failed to load data. Is the server running?</td></tr>';
                }
            }

            // Fetch data immediately when the page loads
            fetchData();
        </script>
    </body>
</html>
